<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ChemistryMaster.ng</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a5c2a, #0d3b1a); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .login-box { background: white; border-radius: 20px; padding: 2.5rem; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h1 { color: #1a5c2a; text-align: center; margin-bottom: 0.5rem; }
        h1 span { color: #00c853; font-size: 0.9rem; display: block; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        input:focus { outline: none; border-color: #1a5c2a; }
        button { width: 100%; padding: 12px; background: #1a5c2a; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:hover { background: #2a7a3a; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: #1a5c2a; text-decoration: none; font-weight: bold; }
        .error { color: red; text-align: center; margin-top: 10px; font-size: 0.9rem; }
        .success { color: #00a86b; text-align: center; margin-top: 10px; font-size: 0.9rem; }
        .forgot-link { text-align: center; margin-top: 0.5rem; }
        .forgot-link a { color: #666; text-decoration: none; font-size: 0.85rem; }
        .forgot-link a:hover { color: #1a5c2a; text-decoration: underline; }
        .back-link { text-align: center; margin-top: 0.5rem; }
        .back-link a { color: #1a5c2a; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🧪 ChemistryMaster.ng</h1>
        <span style="display:block; text-align:center; color:#00c853; font-size:0.9rem; margin-bottom:1rem;">Secure Login • No Demo Access</span>
        
        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email" value="">
            <input type="password" id="password" placeholder="Password" value="">
            <button onclick="login()">Login</button>
            <div id="error" class="error"></div>
            <div class="forgot-link"><a href="#" onclick="showForgotPassword()">Forgot Password?</a></div>
            <div class="links">Don't have an account? <a href="chemistry-signup.html">Sign Up</a></div>
        </div>
        
        <!-- FORGOT PASSWORD FORM -->
        <div id="forgotForm" class="hidden">
            <h2>🔑 Forgot Password</h2>
            <p style="text-align:center; margin-bottom:1rem; color:#666; font-size:0.9rem;">Enter your registered email to retrieve your password.</p>
            <input type="email" id="forgotEmail" placeholder="Enter your email">
            <button onclick="retrievePassword()">Retrieve Password</button>
            <div id="forgotError" class="error"></div>
            <div id="forgotSuccess" class="success"></div>
            <div class="back-link"><a href="#" onclick="showLoginForm()">← Back to Login</a></div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'chemistry_users';
        
        function showForgotPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
            document.getElementById('forgotError').textContent = '';
            document.getElementById('forgotSuccess').textContent = '';
            document.getElementById('forgotEmail').value = '';
        }
        
        function showLoginForm() {
            document.getElementById('forgotForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('error').textContent = '';
        }
        
        function retrievePassword() {
            const email = document.getElementById('forgotEmail').value.trim().toLowerCase();
            const errorDiv = document.getElementById('forgotError');
            const successDiv = document.getElementById('forgotSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (!email) { errorDiv.textContent = 'Please enter your email.'; return; }
            
            let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const user = users.find(u => u.email === email);
            
            if (user) {
                successDiv.innerHTML = `✅ Your password is: <strong>${user.password}</strong><br><small>Please keep it safe!</small>`;
            } else {
                errorDiv.textContent = 'Email not found. Please check or sign up.';
            }
        }
        
        function login() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            errorDiv.textContent = '';
            
            if (!email || !password) { errorDiv.textContent = 'Please enter both email and password.'; return; }
            
            let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                const today = new Date().toDateString();
                if (user.questionsDate !== today) {
                    user.questions = 0;
                    user.questionsDate = today;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                }
                
                sessionStorage.setItem('chemistry_currentUser', JSON.stringify({
                    id: user.id, email: user.email, name: user.name,
                    premium: user.premium || false, questions: user.questions || 0
                }));
                
                window.location.href = 'chemistry-index.html';
            } else {
                const emailExists = users.find(u => u.email === email);
                if (emailExists) {
                    errorDiv.textContent = 'Incorrect password. Try again or use Forgot Password.';
                } else {
                    errorDiv.textContent = 'Invalid email or password.';
                }
            }
        }
        
        document.addEventListener('keypress', function(e) { if (e.key === 'Enter') login(); });
        if (sessionStorage.getItem('chemistry_currentUser')) window.location.href = 'chemistry-index.html';
    </script>
</body>
</html>
